<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato Typer Deluxe</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow-x: hidden;
            overflow-y: hidden; /* Prevents scrollbars from particles */
        }
        
        /* The Cheater Bar */
        #cheater-bar {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%;
            background-color: yellow;
            color: black;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            padding: 8px 0;
            z-index: 9999;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        #game-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
            padding-top: 20px; 
        }

        .screen-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #333;
            position: relative; /* Helps with particle positioning */
        }

        /* Admin Button */
        #admin-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #333; color: #555;
            border: 1px solid #444; padding: 5px 10px;
            cursor: pointer; border-radius: 4px; z-index: 100;
        }
        #admin-btn:hover { background-color: #444; color: white; }

        /* Stats */
        #stats-container {
            position: absolute;
            top: 20px;
            right: 80px; 
            text-align: right;
            z-index: 10;
        }

        #money-container {
            font-size: 28px;
            font-weight: bold;
            color: #4CAF50; 
            cursor: default;
        }
        
        #money-container.admin-active {
            cursor: pointer;
            text-decoration: underline dashed;
        }

        #money-edit-input {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
            background: #111;
            border: 1px solid #4CAF50;
            width: 250px;
            text-align: right;
            outline: none;
        }

        #ai-pieces-container { font-size: 16px; color: #aaa; margin-top: 5px; }

        .word-display { font-size: 48px; margin-bottom: 20px; letter-spacing: 2px; }
        .potato-img { width: 250px; height: auto; margin-bottom: 30px; }
        .typing-input {
            font-size: 24px; padding: 10px; text-align: center;
            border-radius: 8px; border: 2px solid #555; background-color: #222;
            color: white; outline: none; width: 300px;
        }
        .typing-input:focus { border-color: #4CAF50; }

        /* Shop Elements */
        #shop-toggle {
            position: absolute; top: 20px; right: 20px;
            background-color: #ff9800; color: white; border: none;
            padding: 10px 15px; font-size: 18px; border-radius: 5px;
            cursor: pointer; z-index: 100;
        }
        #shop-toggle:hover { background-color: #e68a00; }

        #shop-sidebar {
            position: fixed; top: 0; right: -350px; 
            width: 300px; height: 100vh; background-color: #1a1a1a;
            border-left: 2px solid #333; transition: right 0.3s ease;
            padding: 20px; box-sizing: border-box; z-index: 50;
            display: flex; flex-direction: column; gap: 15px;
        }
        #shop-sidebar.open { right: 0; }
        
        .shop-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 10px;}
        .shop-btn {
            background-color: #333; color: white; border: 1px solid #555;
            padding: 15px; border-radius: 5px; cursor: pointer; text-align: left;
            transition: 0.2s;
        }
        .shop-btn:hover { background-color: #444; border-color: #4CAF50; }
        .shop-btn:disabled { background-color: #222; color: #666; border-color: #333; cursor: not-allowed; }
        .btn-title { font-weight: bold; font-size: 16px; display: block; }
        .btn-cost { color: #4CAF50; font-size: 14px; }
        .btn-desc { font-size: 12px; color: #aaa; margin-top: 5px; display: block; }

        .typed-letter { color: #4CAF50; }
        
        #save-notify {
            position: absolute; top: 70px; right: 80px;
            color: #888; font-size: 12px; opacity: 0; transition: opacity 0.5s;
        }

        /* Modals for Passwords */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-box {
            background: #222; padding: 30px; border-radius: 10px; border: 2px solid #444;
            text-align: center;
        }
        .modal-box h3 { margin-top: 0; color: #ff5555; }
        .modal-input {
            font-size: 20px; padding: 10px; width: 200px; text-align: center;
            border: 1px solid #555; border-radius: 5px; background: #111; color: white; margin-top: 10px;
        }
        #lockout-msg { color: #ff5555; font-size: 14px; margin-top: 10px; display: none; }

        /* Floating Particle Animation */
        .floating-particle {
            position: absolute;
            color: #4CAF50;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            z-index: 500;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0px 0px 5px #000; /* Makes it pop out */
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
        }

    </style>
</head>
<body>

    <div id="cheater-bar">You have cheated by using admin mode!</div>

    <button id="admin-btn" onclick="toggleAdminMode()">admin test</button>

    <div id="admin-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Admin Password</h3>
            <input type="password" id="admin-pass-input" class="modal-input" placeholder="Enter password...">
            <div id="lockout-msg">Locked out. Try again in <span id="lockout-timer">60</span>s.</div>
            <p style="font-size: 12px; color: #666; margin-top:15px;">Press Shift + Enter to submit</p>
        </div>
    </div>

    <div id="admin-confirm-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="color: #4CAF50;">Confirm Money Injection</h3>
            <input type="password" id="admin-confirm-input" class="modal-input" placeholder="Secondary Password...">
            <p style="font-size: 12px; color: #666; margin-top:15px;">Press Enter to submit</p>
        </div>
    </div>

    <div id="stats-container">
        <div id="money-container" onclick="openMoneyEditor()">Money: $<span id="money">0</span></div>
        <div id="ai-pieces-container">AI Pieces: <span id="ai-pieces">0</span>/100</div>
        <div id="save-notify">Game Saved!</div>
    </div>

    <button id="shop-toggle" onclick="toggleShop()">🛒</button>

    <div id="shop-sidebar">
        <div class="shop-title">Upgrades Shop</div>
        
        <button class="shop-btn" id="btn-upgrade-money" onclick="buyMoneyUpgrade()">
            <span class="btn-title">Better Potatoes</span>
            <span class="btn-cost" id="cost-upgrade-money">$100</span>
            <span class="btn-desc" id="desc-upgrade-money">Increases money per word to $10.</span>
        </button>

        <button class="shop-btn" id="btn-buy-piece" onclick="buyAIPiece()">
            <span class="btn-title">Piece of an AI Typer</span>
            <span class="btn-cost" id="cost-buy-piece">$1000</span>
            <span class="btn-desc">Collect 100 to build an AI assistant.</span>
        </button>

        <button class="shop-btn" id="btn-upgrade-ai" onclick="buyAISpeed()" style="display: none;">
            <span class="btn-title">Overclock AI</span>
            <span class="btn-cost" id="cost-upgrade-ai">$10000</span>
            <span class="btn-desc" id="desc-upgrade-ai">Increase AI speed to 2 letters/sec.</span>
        </button>
    </div>

    <div id="game-wrapper">
        <div id="player-screen" class="screen-half">
            <h2>You</h2>
            <div id="word-display" class="word-display">Loading...</div>
            <img id="player-potato" class="potato-img" src="potato.png" alt="A glorious potato">
            <input type="text" id="typing-input" class="typing-input" placeholder="Type here..." autocomplete="off" autofocus>
        </div>

        <div id="ai-screen" class="screen-half" style="display: none;">
            <h2 style="color: #ff9800;">AI Assistant</h2>
            <div id="ai-word-display" class="word-display">Booting up...</div>
            <img id="ai-potato" class="potato-img" src="potato.png" alt="Robo potato" style="filter: grayscale(100%) sepia(100%) hue-rotate(180deg);">
            <div style="color: #aaa;">AI typing at <span id="ai-speed-display">1</span> LPS</div>
        </div>
    </div>

    <script>
        // --- GAME VARIABLES ---
        const words = [
            "potato", "spud", "french fries", "tater tot", "mashed", 
            "keyboard", "typing", "javascript", "developer", "awesome",
            "crispy", "hashbrown", "starch", "yummy", "farming"
        ];
        
        let money = 0;
        let moneyPerWord = 5;
        let currentWord = "";
        
        const moneyUpgrades = [
            { cost: 100, newAmount: 10 },
            { cost: 200, newAmount: 20 },
            { cost: 500, newAmount: 30 }
        ];
        let currentMoneyUpgradeLevel = 0;

        let aiPieces = 0;
        let aiSpeed = 1; 
        let aiUnlocked = false;

        let aiCurrentWord = "";
        let aiTypedIndex = 0;
        let aiInterval;

        let isAdmin = false;
        let hasCheated = false;
        let adminAttempts = 0;
        let isLockedOut = false;
        let pendingMoneyVal = 0;
        const MAX_MONEY = 100000000000000000;

        // --- HTML ELEMENTS ---
        const moneyDisplay = document.getElementById("money");
        const moneyContainer = document.getElementById("money-container");
        const aiPiecesDisplay = document.getElementById("ai-pieces");
        const wordDisplay = document.getElementById("word-display");
        const typingInput = document.getElementById("typing-input");

        // --- SAVE / LOAD SYSTEM ---
        function saveGame() {
            const gameData = {
                money: money,
                moneyPerWord: moneyPerWord,
                currentMoneyUpgradeLevel: currentMoneyUpgradeLevel,
                aiPieces: aiPieces,
                aiSpeed: aiSpeed,
                aiUnlocked: aiUnlocked,
                hasCheated: hasCheated
            };
            localStorage.setItem("potatoTyperSave", JSON.stringify(gameData));
            
            const notify = document.getElementById("save-notify");
            notify.style.opacity = 1;
            setTimeout(() => notify.style.opacity = 0, 1500);
        }

        function loadGame() {
            const savedData = localStorage.getItem("potatoTyperSave");
            if (savedData) {
                const gameData = JSON.parse(savedData);
                money = gameData.money || 0;
                moneyPerWord = gameData.moneyPerWord || 5;
                currentMoneyUpgradeLevel = gameData.currentMoneyUpgradeLevel || 0;
                aiPieces = gameData.aiPieces || 0;
                aiSpeed = gameData.aiSpeed || 1;
                aiUnlocked = gameData.aiUnlocked || false;
                hasCheated = gameData.hasCheated || false;

                if (hasCheated) {
                    document.getElementById("cheater-bar").style.display = "block";
                }

                if (currentMoneyUpgradeLevel < moneyUpgrades.length) {
                    const nextUpgrade = moneyUpgrades[currentMoneyUpgradeLevel];
                    document.getElementById("cost-upgrade-money").textContent = "$" + nextUpgrade.cost;
                    document.getElementById("desc-upgrade-money").textContent = "Increases money per word to $" + nextUpgrade.newAmount + ".";
                } else {
                    document.getElementById("cost-upgrade-money").textContent = "MAXED";
                    document.getElementById("desc-upgrade-money").textContent = "Maximum potato profits reached.";
                }

                if (aiUnlocked) {
                    document.getElementById("btn-buy-piece").style.display = "none";
                    document.getElementById("btn-upgrade-ai").style.display = "block";
                    document.getElementById("ai-screen").style.display = "flex";
                    document.getElementById("cost-upgrade-ai").textContent = "$" + getAISpeedCost();
                    document.getElementById("desc-upgrade-ai").textContent = "Increase AI speed to " + (aiSpeed + 1) + " letters/sec.";
                    document.getElementById("ai-speed-display").textContent = aiSpeed;
                    getNewAIWord();
                    startAILoop();
                } else {
                    document.getElementById("cost-buy-piece").textContent = "$" + getAIPieceCost();
                }
            }
        }

        setInterval(saveGame, 5000);

        // --- ADMIN SYSTEM ---
        function toggleAdminMode() {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById("admin-btn").textContent = "admin test";
                moneyContainer.classList.remove("admin-active");
                hasCheated = true;
                document.getElementById("cheater-bar").style.display = "block";
                saveGame();
                updateUI();
            } else {
                document.getElementById("admin-modal").style.display = "flex";
                document.getElementById("admin-pass-input").focus();
            }
        }

        document.getElementById("admin-pass-input").addEventListener("keydown", function(e) {
            if (isLockedOut) { e.preventDefault(); return; }

            if (e.key === "Enter" && e.shiftKey) {
                e.preventDefault();
                if (this.value === "Ctrl + W") {
                    isAdmin = true;
                    this.value = "";
                    adminAttempts = 0;
                    document.getElementById("admin-modal").style.display = "none";
                    document.getElementById("admin-btn").textContent = "Exit Admin Mode";
                    moneyContainer.classList.add("admin-active");
                    typingInput.focus();
                } else {
                    adminAttempts++;
                    this.value = "";
                    if (adminAttempts >= 3) lockoutAdmin();
                }
            } else if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                adminAttempts++;
                this.value = "";
                if (adminAttempts >= 3) lockoutAdmin();
            }
        });

        function lockoutAdmin() {
            isLockedOut = true;
            document.getElementById("admin-pass-input").disabled = true;
            document.getElementById("lockout-msg").style.display = "block";
            
            let timeLeft = 60;
            const timerSpan = document.getElementById("lockout-timer");
            timerSpan.textContent = timeLeft;

            const countdown = setInterval(() => {
                timeLeft--;
                timerSpan.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    isLockedOut = false;
                    adminAttempts = 0;
                    document.getElementById("admin-pass-input").disabled = false;
                    document.getElementById("lockout-msg").style.display = "none";
                    document.getElementById("admin-pass-input").focus();
                }
            }, 1000);
        }

        function openMoneyEditor() {
            if (!isAdmin) return;
            moneyContainer.innerHTML = `Money: $<input type="text" id="money-edit-input" value="${money}">`;
            const editInput = document.getElementById("money-edit-input");
            editInput.focus();

            editInput.addEventListener("input", function() {
                let val = this.value.replace(/[^0-9]/g, '');
                if (val !== "" && parseInt(val, 10) > MAX_MONEY) val = MAX_MONEY.toString();
                this.value = val;
            });

            editInput.addEventListener("keydown", function(e) {
                if (e.key === "Enter") {
                    let val = parseInt(this.value, 10);
                    if (isNaN(val)) val = money;
                    pendingMoneyVal = val;
                    document.getElementById("admin-confirm-modal").style.display = "flex";
                    document.getElementById("admin-confirm-input").value = "";
                    document.getElementById("admin-confirm-input").focus();
                }
            });
        }

        document.getElementById("admin-confirm-input").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                if (this.value === "$Give_me_the_money") {
                    money = pendingMoneyVal;
                    document.getElementById("admin-confirm-modal").style.display = "none";
                    updateUI();
                    saveGame();
                    typingInput.focus();
                } else {
                    document.getElementById("admin-confirm-modal").style.display = "none";
                    updateUI();
                    typingInput.focus();
                }
            }
        });

        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.style.display = "none";
                    if (this.id === "admin-confirm-modal") updateUI();
                    typingInput.focus();
                }
            });
        });

        // --- FLOATING PARTICLES ---
        function spawnParticle(amount, isAI) {
            const particle = document.createElement("div");
            particle.className = "floating-particle";
            particle.textContent = "+$" + amount.toLocaleString();
            
            // Get the correct potato to spawn above
            const targetId = isAI ? "ai-potato" : "player-potato";
            const targetEl = document.getElementById(targetId);
            
            if (targetEl) {
                const rect = targetEl.getBoundingClientRect();
                // Randomize slightly so they don't perfectly stack
                const offsetX = (Math.random() - 0.5) * 80; 
                const offsetY = (Math.random() - 0.5) * 40;
                
                // Position based on the screen coordinates of the potato
                particle.style.left = (rect.left + (rect.width / 2) - 20 + offsetX) + "px";
                particle.style.top = (rect.top + offsetY) + "px";
            }
            
            document.body.appendChild(particle);
            
            // Delete the particle HTML element after 1 second
            setTimeout(() => particle.remove(), 1000);
        }

        // --- CORE GAMEPLAY ---
        function getNewWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            wordDisplay.textContent = currentWord;
        }

        typingInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                const typedText = typingInput.value.trim().toLowerCase();
                if (typedText === currentWord.toLowerCase()) {
                    addMoney(moneyPerWord);
                    spawnParticle(moneyPerWord, false); // Spawn on player side
                    getNewWord();
                }
                typingInput.value = "";
            }
        });

        function addMoney(amount) {
            money += amount;
            if (money > MAX_MONEY) money = MAX_MONEY;
            updateUI();
        }

        function updateUI() {
            if (!document.getElementById("money-edit-input")) {
                moneyContainer.innerHTML = `Money: $<span id="money">${money.toLocaleString()}</span>`;
            }
            
            aiPiecesDisplay.textContent = aiPieces;
            
            document.getElementById("btn-upgrade-money").disabled = 
                (currentMoneyUpgradeLevel < moneyUpgrades.length) ? (money < moneyUpgrades[currentMoneyUpgradeLevel].cost) : true;
            
            document.getElementById("btn-buy-piece").disabled = 
                (!aiUnlocked) ? (money < getAIPieceCost()) : true;

            document.getElementById("btn-upgrade-ai").disabled = 
                (money < getAISpeedCost());
        }

        // --- SHOP LOGIC ---
        function toggleShop() { document.getElementById("shop-sidebar").classList.toggle("open"); }

        function buyMoneyUpgrade() {
            if (currentMoneyUpgradeLevel >= moneyUpgrades.length) return;
            const upgrade = moneyUpgrades[currentMoneyUpgradeLevel];
            
            if (money >= upgrade.cost) {
                money -= upgrade.cost;
                moneyPerWord = upgrade.newAmount;
                currentMoneyUpgradeLevel++;
                
                if (currentMoneyUpgradeLevel < moneyUpgrades.length) {
                    const nextUpgrade = moneyUpgrades[currentMoneyUpgradeLevel];
                    document.getElementById("cost-upgrade-money").textContent = "$" + nextUpgrade.cost;
                    document.getElementById("desc-upgrade-money").textContent = "Increases money per word to $" + nextUpgrade.newAmount + ".";
                } else {
                    document.getElementById("cost-upgrade-money").textContent = "MAXED";
                    document.getElementById("desc-upgrade-money").textContent = "Maximum potato profits reached.";
                    document.getElementById("btn-upgrade-money").disabled = true;
                }
                updateUI();
                saveGame();
            }
        }

        function getAIPieceCost() { return (aiPieces + 1) * 1000; }

        function buyAIPiece() {
            if (aiUnlocked) return;
            const cost = getAIPieceCost();
            
            if (money >= cost) {
                money -= cost;
                aiPieces++;
                
                if (aiPieces >= 100) {
                    unlockAI();
                } else {
                    document.getElementById("cost-buy-piece").textContent = "$" + getAIPieceCost();
                }
                updateUI();
                saveGame();
            }
        }

        function getAISpeedCost() { return aiSpeed * 10000; }

        function buyAISpeed() {
            const cost = getAISpeedCost();
            if (money >= cost) {
                money -= cost;
                aiSpeed++;
                document.getElementById("cost-upgrade-ai").textContent = "$" + getAISpeedCost();
                document.getElementById("desc-upgrade-ai").textContent = "Increase AI speed to " + (aiSpeed + 1) + " letters/sec.";
                document.getElementById("ai-speed-display").textContent = aiSpeed;
                startAILoop(); 
                updateUI();
                saveGame();
            }
        }

        // --- AI LOGIC ---
        function unlockAI() {
            aiUnlocked = true;
            document.getElementById("btn-buy-piece").style.display = "none"; 
            document.getElementById("btn-upgrade-ai").style.display = "block"; 
            document.getElementById("ai-screen").style.display = "flex";
            getNewAIWord();
            startAILoop();
        }

        function getNewAIWord() {
            aiCurrentWord = words[Math.floor(Math.random() * words.length)];
            aiTypedIndex = 0;
            renderAIWord();
        }

        function renderAIWord() {
            const typedPart = aiCurrentWord.substring(0, aiTypedIndex);
            const untypedPart = aiCurrentWord.substring(aiTypedIndex);
            document.getElementById("ai-word-display").innerHTML = 
                `<span class="typed-letter">${typedPart}</span>${untypedPart}`;
        }

        function startAILoop() {
            clearInterval(aiInterval);
            const delay = 1000 / aiSpeed; 
            
            aiInterval = setInterval(() => {
                aiTypedIndex++;
                renderAIWord();
                
                if (aiTypedIndex >= aiCurrentWord.length) {
                    addMoney(moneyPerWord); 
                    spawnParticle(moneyPerWord, true); // Spawn on AI side
                    setTimeout(getNewAIWord, 200); 
                }
            }, delay);
        }

        // Init Game
        loadGame();
        getNewWord();
        updateUI();
        
        // Return focus to input when clicking outside the shop
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('shop-sidebar');
            const toggle = document.getElementById('shop-toggle');
            if (!sidebar.contains(event.target) && event.target !== toggle && !event.target.classList.contains('shop-btn') && !event.target.closest('.modal-box')) {
                sidebar.classList.remove('open');
                if(!document.getElementById("admin-modal").style.display || document.getElementById("admin-modal").style.display === "none") {
                    if(!document.getElementById("admin-confirm-modal").style.display || document.getElementById("admin-confirm-modal").style.display === "none"){
                        typingInput.focus();
                    }
                }
            }
        });
    </script>
</body>
</html>
